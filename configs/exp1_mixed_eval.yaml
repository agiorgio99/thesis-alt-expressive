# ═════════════════════════════════════════════════════════════════════════════
#  exp1_mixed_eval.yaml
#
#  Evaluate the Experiment-1 fine-tuned checkpoint on the shared held-out test
#  set (30 % of original GTSinger technique utterances).
#
#  Training for this experiment used:
#    • ALL augmented technique WAVs
#    • 20 % of original technique WAVs  (stratified by technique, seed 42)
#
#  The test set is the same 30 % of original data used in experiment 2, so
#  WER figures are directly comparable across both experiments.
#
#  Prerequisites
#  ─────────────
#  1. Run fine-tuning:
#       python scripts/finetune_whisper.py \
#           --mode mixed \
#           --aug-src  data/GTSinger_Augmented/English \
#           --orig-src data/GTSinger/English
#
#  2. Run evaluation (this config):
#       python scripts/run_pipeline.py \
#           --config configs/exp1_mixed_eval.yaml --stage asr
#
#  Results → results/exp1_mixed_eval/asr_whisper_finetuned_mixed*.csv
# ═════════════════════════════════════════════════════════════════════════════

experiment_name: exp1_mixed_eval

paths:
  dataset_root: data/GTSinger/English
  results_dir:  results
  work_dir:     data/_work

data:
  name:     gtsinger
  language: english
  limit:    null
  # Restrict evaluation to the shared held-out 30 % test split.
  # This file is written by finetune_whisper.py (both modes).
  manifest: results/shared_test_manifest.json

asr:
  enabled: true
  model_names:
    - whisper_finetuned
  device: cuda
  batch_size: 8
  language: en
  extra:
    model_id: results/finetune_whisper_mixed/best_model

alignment:
  enabled: false

pitch:
  enabled: false

evaluation:
  stratify_by: [technique, singer_id]
  hallucination_threshold: 1.0
