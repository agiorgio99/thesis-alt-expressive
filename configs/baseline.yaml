# ═════════════════════════════════════════════════════════════════════════════
#  baseline.yaml — Phase 1 baseline: all ASR models on GTSinger English
# ═════════════════════════════════════════════════════════════════════════════

experiment_name: baseline_english

paths:
  dataset_root: data/GTSinger/English
  results_dir:  results
  work_dir:     data/_work

data:
  name: gtsinger
  language: english
  limit: null             # null = all utterances; set an int for a quick test

# ── ASR — all models run in sequence, each gets its own CSV ──────────────────
asr:
  enabled: true
  model_names:
    - whisper_largev3
    - whisper_largev2
    - whisper_small
    - wav2vec2
    # - fireredasr      # uncomment after setting repo_dir/model_dir below
  device: cuda
  batch_size: 8
  language: en
  extra: {}
  # For FireRedASR, replace extra above with:
  # extra:
  #   repo_dir:  /path/to/FireRedASR
  #   model_dir: /path/to/FireRedASR-AED-L

# ── Forced alignment ─────────────────────────────────────────────────────────
alignment:
  enabled: true
  aligner: mfa
  device: cpu
  extra:
    acoustic_model: english_mfa
    dictionary:     english_mfa
    mfa_bin:        /home/antonello/miniforge3/envs/aligner/bin/mfa

# ── Pitch tracking ───────────────────────────────────────────────────────────
pitch:
  enabled: true
  model_capacity: full    # torchcrepe only has tiny and full; full = best accuracy
  device: cuda
  step_ms: 10

# ── Evaluation ───────────────────────────────────────────────────────────────
evaluation:
  stratify_by: [technique, singer_id]
  hallucination_threshold: 1.0
